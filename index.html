<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. CSP - Камер, Микрофон, Mapbox зөвшөөрөх -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self'; 
      connect-src 'self' https://*.pusher.com wss://*.pusher.com https://rtc.live.cloudflare.com wss://rtc.live.cloudflare.com https://stun.cloudflare.com https://api.cloudflare.com https://api.cnviptravel.com https://viptravel-backend.erdneebatulzii23.workers.dev https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.identitytoolkit.googleapis.com https://api.mapbox.com https://*.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com; 
      script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdn.tailwindcss.com https://esm.sh https://stats.pusher.com https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com https://static.cloudflareinsights.com https://api.mapbox.com; 
      script-src-elem 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://esm.sh https://stats.pusher.com https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com https://static.cloudflareinsights.com; 
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; 
      font-src 'self' https://fonts.gstatic.com; 
      media-src 'self' blob: mediastream: https://rtc.live.cloudflare.com https://api.cnviptravel.com https://viptravel-backend.erdneebatulzii23.workers.dev; 
      img-src * data: blob:; 
      frame-src 'self' https://rtc.live.cloudflare.com https://*.firebaseapp.com; 
      worker-src 'self' blob:; 
      child-src 'self' blob:;
    ">

    <!-- 2. Камер, Микрофон ашиглах эрхийг идэвхжүүлэх (Маш чухал) -->
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), display-capture=(self)">

    <title>CJ Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2b8cee',
              'background-light': '#f6f7f8',
              'background-dark': '#101922',
            },
            fontFamily: {
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            animation: {
              'slide-up': 'slideUp 0.3s ease-out',
              'fade-in': 'fadeIn 0.3s ease-out',
            },
            keyframes: {
              slideUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style type="text/css">
      /* Scrollbar нуух хэсэг */
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }

      /* Icon-ы стилүүд */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .filled-icon {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
        "vite": "https://esm.sh/vite@^7.3.1"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
